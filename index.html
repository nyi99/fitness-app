<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fitness">
<meta name="theme-color" content="#0D0D0D">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Strength & Recomposition</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0D0D0D; --bg2: #111; --bg3: #0A0A0A; --bg4: #0C0C0C;
    --border: #1C1C1C; --border2: #1A1A1A; --border3: #161616;
    --text: #E8E4DC; --dim: #444; --dim2: #333; --dim3: #2A2A2A; --dim4: #222;
    --gold: #C8A96E; --teal: #7EB8A4; --purple: #A67EC8;
    --gold-bg: rgba(200,169,110,0.07); --teal-bg: rgba(126,184,164,0.07); --purple-bg: rgba(166,126,200,0.07);
    --gold-dim: rgba(200,169,110,0.15); --teal-dim: rgba(126,184,164,0.15); --purple-dim: rgba(166,126,200,0.15);
    --mono: 'Courier New', monospace; --serif: Georgia, 'Times New Roman', serif;
    --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--serif); overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100%; padding-top: var(--safe-top); }

  /* HEADER */
  .header { border-bottom: 1px solid var(--border2); padding: 20px 20px 16px; flex-shrink: 0; }
  .header-label { font-size: 9px; letter-spacing: 4px; color: var(--dim); text-transform: uppercase; font-family: var(--mono); margin-bottom: 5px; }
  .header h1 { font-size: 22px; font-weight: normal; letter-spacing: -0.5px; margin-bottom: 3px; }
  .header-sub { font-size: 11px; color: var(--dim2); font-family: var(--mono); }

  /* NAV */
  .nav { display: flex; border-bottom: 1px solid var(--border2); background: #090909; flex-shrink: 0; }
  .nav-btn { flex: 1; padding: 11px 2px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--dim3); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; font-family: var(--mono); cursor: pointer; transition: all 0.2s; }
  .nav-btn.active { color: var(--text); border-bottom-color: var(--text); }

  /* SCROLL AREA */
  .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 18px calc(18px + var(--safe-bottom)); }

  /* DAY TABS */
  .day-tabs { display: flex; overflow-x: auto; border-bottom: 1px solid var(--border3); background: var(--bg3); flex-shrink: 0; scrollbar-width: none; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab { flex-shrink: 0; padding: 12px 14px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--dim3); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-family: var(--mono); cursor: pointer; transition: all 0.2s; }

  /* SECTION LABEL */
  .sec-label { font-size: 9px; letter-spacing: 3px; color: var(--dim3); text-transform: uppercase; font-family: var(--mono); margin-bottom: 10px; }

  /* CARDS */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 14px 16px; margin-bottom: 12px; }
  .card-dark { background: var(--bg3); border: 1px solid var(--border2); border-radius: 4px; padding: 14px 16px; margin-bottom: 12px; }

  /* MOVEMENT ROW */
  .mov-row { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 2px; transition: all 0.15s; }
  .mov-row.done { opacity: 0.55; }
  .mov-header { display: flex; align-items: center; padding: 13px 14px; cursor: pointer; }
  .mov-dot { width: 6px; height: 6px; border-radius: 50%; background: #1E1E1E; border: 1px solid #2E2E2E; margin-right: 13px; flex-shrink: 0; transition: all 0.2s; }
  .mov-dot.checked { background: var(--accent); border-color: var(--accent); }
  .mov-info { flex: 1; }
  .mov-name { font-size: 13px; color: var(--text); margin-bottom: 3px; transition: all 0.15s; }
  .mov-name.done { text-decoration: line-through; color: var(--dim); }
  .mov-note { font-size: 10px; color: var(--dim3); font-family: var(--mono); line-height: 1.5; }
  .mov-right { display: flex; align-items: center; gap: 8px; margin-left: 8px; }
  .mov-sets { font-family: var(--mono); font-size: 11px; color: var(--accent); flex-shrink: 0; }
  .mov-sets.done { color: var(--dim3); }
  .log-btn { background: #181818; border: 1px solid #252525; color: #333; border-radius: 3px; padding: 4px 7px; font-size: 9px; font-family: var(--mono); cursor: pointer; letter-spacing: 1px; transition: all 0.15s; flex-shrink: 0; }
  .log-btn.open { background: var(--accent-dim); border-color: var(--accent-dim2); color: var(--accent); }

  /* LOG PANEL */
  .log-panel { border-top: 1px solid var(--border2); padding: 13px 14px 15px; background: var(--bg4); }
  .log-grid-head { display: grid; grid-template-columns: 26px 1fr 1fr 1fr; gap: 5px; margin-bottom: 6px; }
  .log-grid-row { display: grid; grid-template-columns: 26px 1fr 1fr 1fr; gap: 5px; margin-bottom: 5px; align-items: center; }
  .log-set-num { font-family: var(--mono); font-size: 10px; color: var(--dim3); }
  .log-head-cell { font-size: 9px; color: var(--dim4); font-family: var(--mono); letter-spacing: 1px; }
  .log-input { background: #141414; border: 1px solid var(--dim4); border-radius: 3px; color: var(--text); font-family: var(--mono); font-size: 12px; padding: 5px 7px; width: 100%; outline: none; }
  .log-input:focus { border-color: var(--accent); }
  .log-input.weight { color: var(--accent); }

  /* PHASE HEADER */
  .phase-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; margin-top: 6px; }
  .phase-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-family: var(--mono); }
  .phase-dur { font-size: 10px; color: var(--dim3); font-family: var(--mono); }

  /* CHECKLIST ROW */
  .check-row { display: flex; align-items: flex-start; gap: 13px; padding: 12px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 2px; cursor: pointer; transition: all 0.15s; }
  .check-row.checked { opacity: 0.55; }
  .check-dot { width: 6px; height: 6px; border-radius: 50%; background: #1E1E1E; border: 1px solid #2E2E2E; flex-shrink: 0; margin-top: 4px; transition: all 0.2s; }
  .check-dot.on { background: var(--accent, var(--teal)); border-color: var(--accent, var(--teal)); }
  .check-body { flex: 1; }
  .check-name { font-size: 13px; color: var(--text); margin-bottom: 3px; }
  .check-name.done { text-decoration: line-through; color: var(--dim); }
  .check-note { font-size: 10px; color: var(--dim3); font-family: var(--mono); line-height: 1.5; }
  .check-dur { font-family: var(--mono); font-size: 10px; color: var(--accent, var(--teal)); flex-shrink: 0; margin-top: 2px; white-space: nowrap; }

  /* WEEK SCHEDULE */
  .week-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 2px; }
  .week-day { font-size: 13px; color: var(--text); margin-bottom: 3px; }
  .week-detail { font-size: 10px; color: var(--dim3); font-family: var(--mono); line-height: 1.5; }
  .week-tag { font-size: 9px; font-family: var(--mono); letter-spacing: 1px; flex-shrink: 0; margin-left: 10px; }

  /* VOLUME TABLE */
  .vol-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 14px; border-bottom: 1px solid var(--border3); }
  .vol-row:last-child { border-bottom: none; }
  .vol-group { font-size: 13px; color: var(--text); margin-bottom: 3px; }
  .vol-note { font-size: 10px; color: var(--dim3); font-family: var(--mono); }
  .vol-sets { font-family: var(--mono); font-size: 12px; color: var(--dim); flex-shrink: 0; margin-left: 12px; }

  /* HISTORY */
  .hist-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
  .hist-head { padding: 11px 14px; border-bottom: 1px solid var(--border3); display: flex; justify-content: space-between; align-items: center; }
  .hist-mov { font-size: 13px; color: var(--text); margin-bottom: 2px; }
  .hist-day { font-size: 10px; color: var(--dim2); font-family: var(--mono); }
  .hist-dot { width: 5px; height: 5px; border-radius: 50%; }
  .hist-body { padding: 11px 14px; }
  .hist-grid { display: grid; grid-template-columns: 26px 1fr 1fr 1fr; gap: 5px; margin-bottom: 7px; }
  .hist-row { display: grid; grid-template-columns: 26px 1fr 1fr 1fr; gap: 5px; margin-bottom: 4px; }
  .hist-cell { font-family: var(--mono); font-size: 11px; }
  .hist-head-cell { font-size: 9px; color: var(--dim4); font-family: var(--mono); letter-spacing: 1px; }

  /* INFO BOX */
  .info-box { padding: 12px 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 4px; margin-bottom: 16px; font-size: 11px; color: var(--dim); line-height: 1.7; }

  /* RATIONALE TOGGLE */
  .rationale-btn { background: none; border: none; color: var(--dim3); font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; padding: 0 0 14px; display: block; }
  .rationale-box { padding: 13px 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 4px; margin-bottom: 14px; font-size: 12px; color: var(--dim); line-height: 1.7; font-style: italic; }

  /* CARDIO BOX */
  .cardio-box { padding: 13px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 20px; }
  .cardio-main { font-size: 13px; color: var(--text); margin-bottom: 5px; }
  .cardio-note { font-size: 10px; color: var(--dim3); font-family: var(--mono); line-height: 1.6; }

  /* PROGRESS BAR */
  .prog-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .prog-focus { font-size: 13px; font-style: italic; }
  .prog-count { font-family: var(--mono); font-size: 11px; color: var(--dim2); margin-top: 18px; }

  /* SUNDAY */
  .rest-screen { text-align: center; padding: 60px 20px; }
  .rest-dash { font-size: 20px; color: #1A1A1A; margin-bottom: 12px; }
  .rest-label { font-size: 13px; color: var(--dim3); font-family: var(--mono); letter-spacing: 2px; }
  .rest-sub { font-size: 11px; color: #1A1A1A; font-family: var(--mono); margin-top: 8px; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; }
  .empty-main { font-size: 13px; color: var(--dim3); font-family: var(--mono); margin-bottom: 8px; }
  .empty-sub { font-size: 11px; color: #1A1A1A; font-family: var(--mono); }

  /* NOTE BULLETS */
  .note-list { }
  .note-item { display: flex; gap: 10px; margin-bottom: 8px; }
  .note-dash { color: #1E1E1E; font-family: var(--mono); font-size: 10px; flex-shrink: 0; margin-top: 3px; }
  .note-text { font-size: 12px; color: var(--dim); line-height: 1.6; }

  /* INSTALL BANNER */
  .install-banner { display: none; position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 18px; right: 18px; background: #1A1A1A; border: 1px solid var(--gold); border-radius: 6px; padding: 14px 16px; z-index: 100; }
  .install-banner.show { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .install-text { font-size: 12px; color: var(--text); line-height: 1.5; }
  .install-text span { display: block; font-size: 10px; color: var(--dim2); font-family: var(--mono); margin-top: 2px; }
  .install-btn { background: var(--gold); color: #0D0D0D; border: none; border-radius: 3px; padding: 8px 14px; font-family: var(--mono); font-size: 10px; letter-spacing: 1px; cursor: pointer; flex-shrink: 0; }
  .install-close { background: none; border: none; color: var(--dim); font-size: 16px; cursor: pointer; flex-shrink: 0; padding: 0 4px; }
</style>
</head>
<body>

    <div class="header-label">Full Weekly Program</div>

</div>

<div class="install-banner" id="install-banner">

  <button class="install-btn" id="install-btn">INSTALL</button>

</div>

// ─── DB ──────────────────────────────────────────────────────────────────────

let db;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('FitnessApp', 2);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('logs')) d.createObjectStore('logs');
      if (!d.objectStoreNames.contains('checks')) d.createObjectStore('checks');
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}

function dbGet(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result || null);
    req.onerror = () => rej(req.error);
  });
}

function dbPut(store, key, val) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(val, key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

function dbGetAll(store) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const store_ = tx.objectStore(store);
    const keys = [], vals = [];
    store_.openCursor().onsuccess = e => {
      const c = e.target.result;
      if (c) { keys.push(c.key); vals.push(c.value); c.continue(); }
      else res({ keys, vals });
    };
  });
}

async function loadLogs() {

  keys.forEach((k, i) => { state.logs[k] = vals[i]; });
}

async function loadChecks() {
  const { keys, vals } = await dbGetAll('checks');
  keys.forEach((k, i) => { state.checks[k] = vals[i]; });
}

async function saveLog(key, data) {
  state.logs[key] = data;
  await dbPut('logs', key, data);
}

async function saveCheck(key, val) {
  state.checks[key] = val;
  await dbPut('checks', key, val);
}

const h = (tag, attrs = {}, ...children) => {
  const el = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
};

function renderLift() {
  const frag = document.createDocumentFragment();

  // Day tabs
  const tabs = h('div', { class: 'day-tabs', id: 'day-tabs' });
  ALL_DAYS.forEach(d => {
    const dc = DAY_COLORS[d];
    const tab = h('button', { class: 'day-tab' }, d.slice(0, 3));

    tab.addEventListener('click', () => {

    });
    tabs.appendChild(tab);
  });
  frag.appendChild(tabs);

  const scroll = h('div', { class: 'scroll' });
  const d = state.liftDay;
  const dc = DAY_COLORS[d];

  if (LIFT_DAYS.includes(d)) {
    const routine = LIFTING[d];
    const doneCount = routine.movements.filter((_, i) => state.checks[`lift-${d}-${i}`]).length;

    // Focus row
    scroll.appendChild(h('div', { class: 'prog-row' },
      h('div', {},
        h('div', { class: 'sec-label', style: { marginBottom: '4px' } }, 'Focus'),
        h('div', { class: 'prog-focus', style: { color: dc.accent } }, routine.focus)
      ),
      h('div', { class: 'prog-count', id: 'lift-count' }, `${doneCount}/${routine.movements.length}`)
    ));

    // Rationale
    const rationaleBox = h('div', { class: 'rationale-box', style: { display: state.showRationale[d] ? 'block' : 'none' } }, routine.rationale);
    const rationaleBtn = h('button', { class: 'rationale-btn' }, state.showRationale[d] ? '▲ hide rationale' : '▼ why these movements');
    rationaleBtn.addEventListener('click', () => {
      state.showRationale[d] = !state.showRationale[d];
      rationaleBox.style.display = state.showRationale[d] ? 'block' : 'none';
      rationaleBtn.textContent = state.showRationale[d] ? '▲ hide rationale' : '▼ why these movements';
    });
    scroll.appendChild(rationaleBtn);
    scroll.appendChild(rationaleBox);

    // Movements
    routine.movements.forEach((mv, i) => {
      const movKey = `${d}-${i}`;
      const checkKey = `lift-${d}-${i}`;
      const isDone = !!state.checks[checkKey];
      const isExp = !!state.expandedMovs[movKey];
      const logData = state.logs[movKey] || {};

      const dot = h('div', { class: `mov-dot${isDone ? ' checked' : ''}`, style: { '--accent': dc.hex } });
      const name = h('div', { class: `mov-name${isDone ? ' done' : ''}` }, mv.name);
      const note = h('div', { class: 'mov-note' }, mv.note);
      const setsLabel = h('div', { class: `mov-sets${isDone ? ' done' : ''}`, style: { color: isDone ? 'var(--dim3)' : dc.accent } }, `${mv.sets}×${mv.reps}`);
      const logBtn = h('button', { class: `log-btn${isExp ? ' open' : ''}` }, isExp ? 'HIDE' : 'LOG');

      logBtn.style.setProperty('--accent', dc.hex);
      if (isExp) {
        logBtn.style.background = dc.dim;
        logBtn.style.borderColor = dc.hex + '55';
        logBtn.style.color = dc.hex;
      }

      const movHeader = h('div', { class: 'mov-header' },
        dot, h('div', { class: 'mov-info' }, name, note),
        h('div', { class: 'mov-right' }, setsLabel, logBtn)
      );

      movHeader.addEventListener('click', async (e) => {
        if (e.target === logBtn || logBtn.contains(e.target)) return;
        const newVal = !state.checks[checkKey];
        await saveCheck(checkKey, newVal);
        dot.className = `mov-dot${newVal ? ' checked' : ''}`;
        name.className = `mov-name${newVal ? ' done' : ''}`;
        setsLabel.className = `mov-sets${newVal ? ' done' : ''}`;
        setsLabel.style.color = newVal ? 'var(--dim3)' : dc.accent;
        movRow.className = `mov-row${newVal ? ' done' : ''}`;
        movRow.style.background = newVal ? dc.bg : '';
        movRow.style.borderColor = newVal ? dc.hex + '33' : 'var(--border)';
        const newDone = routine.movements.filter((_, j) => state.checks[`lift-${d}-${j}`]).length;
        document.getElementById('lift-count').textContent = `${newDone}/${routine.movements.length}`;
      });

      // Log panel
      const logPanel = h('div', { class: 'log-panel', style: { display: isExp ? 'block' : 'none' } });
      logPanel.appendChild(h('div', { class: 'sec-label' }, 'Set Log'));
      const headGrid = h('div', { class: 'log-grid-head' });
      ['SET','LBS','REPS','NOTE'].forEach(lbl => headGrid.appendChild(h('div', { class: 'log-head-cell' }, lbl)));
      logPanel.appendChild(headGrid);

      for (let si = 0; si < mv.sets; si++) {
        const setData = logData[si] || {};
        const numEl = h('div', { class: 'log-set-num' }, String(si + 1).padStart(2, '0'));
        const wInput = h('input', { class: 'log-input weight', type: 'number', placeholder: '—', value: setData.weight || '' });
        const rInput = h('input', { class: 'log-input', type: 'number', placeholder: '—', value: setData.reps || '' });
        const nInput = h('input', { class: 'log-input', type: 'text', placeholder: '—', value: setData.note || '' });

        const saveInputs = async () => {
          const current = state.logs[movKey] || {};
          current[si] = { weight: wInput.value, reps: rInput.value, note: nInput.value };
          await saveLog(movKey, current);
        };
        wInput.addEventListener('input', saveInputs);
        rInput.addEventListener('input', saveInputs);
        nInput.addEventListener('input', saveInputs);

        wInput.style.color = dc.hex;
        const row = h('div', { class: 'log-grid-row' }, numEl, wInput, rInput, nInput);
        logPanel.appendChild(row);
      }

      logBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        state.expandedMovs[movKey] = !state.expandedMovs[movKey];
        const nowOpen = state.expandedMovs[movKey];
        logPanel.style.display = nowOpen ? 'block' : 'none';
        logBtn.textContent = nowOpen ? 'HIDE' : 'LOG';
        logBtn.className = `log-btn${nowOpen ? ' open' : ''}`;
        if (nowOpen) {
          logBtn.style.background = dc.dim;
          logBtn.style.borderColor = dc.hex + '55';
          logBtn.style.color = dc.hex;
        } else {
          logBtn.style.background = '#181818';
          logBtn.style.borderColor = '#252525';
          logBtn.style.color = '#333';
        }
      });

      const movRow = h('div', { class: `mov-row${isDone ? ' done' : ''}` }, movHeader, logPanel);
      movRow.style.background = isDone ? dc.bg : '';
      movRow.style.borderColor = isDone ? dc.hex + '33' : 'var(--border)';
      scroll.appendChild(movRow);
    });

    // Cardio
    scroll.appendChild(h('div', { style: { height: '20px' } }));
    scroll.appendChild(secLabel('Incline Treadmill — Post Lift'));
    const c = routine.cardio;
    scroll.appendChild(h('div', { class: 'cardio-box' },
      h('div', { class: 'cardio-main' }, `${c.duration} · ${c.incline} incline · ${c.pace}`),
      h('div', { class: 'cardio-note' }, c.note)

    scroll.appendChild(h('div', { style: { marginBottom: '20px' } },
      h('div', { class: 'sec-label', style: { marginBottom: '4px' } }, 'Off Day'),
      h('div', { style: { fontSize: '14px', color: dc.accent, fontStyle: 'italic' } }, 'Cardio + Foot Rehab')

    scroll.appendChild(h('div', { style: { marginBottom: '20px' } },

        h('div', { class: 'check-dur', style: { color: dc.accent } }, mv.duration)
      ));
    });

  } else {
    scroll.appendChild(h('div', { class: 'rest-screen' },
      h('div', { class: 'rest-dash' }, '—'),
      h('div', { class: 'rest-label' }, 'FULL REST'),
      h('div', { class: 'rest-sub' }, 'Morning routine still applies. Everything else — off.')
    ));
  }

  frag.appendChild(scroll);
  return frag;
}

async function renderHistory() {
  const { keys, vals } = await dbGetAll('logs');
  const frag = document.createDocumentFragment();
  frag.appendChild(secLabel('Weight Log History'));

  const entries = [];
  keys.forEach((k, i) => {
    const [day, movIdx] = k.split('-');
    if (!LIFTING[day]) return;
    const mv = LIFTING[day].movements[parseInt(movIdx)];
    if (!mv) return;
    const sets = Object.entries(vals[i]).filter(([, v]) => v.weight || v.reps);
    if (sets.length > 0) entries.push({ day, movement: mv.name, sets, color: DAY_COLORS[day] });
  });

  if (entries.length === 0) {
    frag.appendChild(h('div', { class: 'empty' },
      h('div', { class: 'empty-main' }, 'No sets logged yet.'),
      h('div', { class: 'empty-sub' }, 'Go to Lift → select a day → tap LOG.')
    ));
  } else {
    entries.forEach(entry => {
      const card = h('div', { class: 'hist-card' });
      card.appendChild(h('div', { class: 'hist-head' },
        h('div', {},
          h('div', { class: 'hist-mov' }, entry.movement),
          h('div', { class: 'hist-day' }, entry.day)
        ),
        h('div', { class: 'hist-dot', style: { background: entry.color.hex } })
      ));
      const body = h('div', { class: 'hist-body' });
      const headRow = h('div', { class: 'hist-grid' });
      ['SET','LBS','REPS','NOTE'].forEach(lbl => headRow.appendChild(h('div', { class: 'hist-head-cell' }, lbl)));
      body.appendChild(headRow);
      entry.sets.forEach(([si, val]) => {
        const row = h('div', { class: 'hist-row' });
        row.appendChild(h('div', { class: 'hist-cell', style: { color: 'var(--dim3)' } }, String(Number(si) + 1).padStart(2, '0')));
        row.appendChild(h('div', { class: 'hist-cell', style: { color: entry.color.hex } }, val.weight || '—'));
        row.appendChild(h('div', { class: 'hist-cell', style: { color: 'var(--text)' } }, val.reps || '—'));
        row.appendChild(h('div', { class: 'hist-cell', style: { color: 'var(--dim)' } }, val.note || '—'));
        body.appendChild(row);
      });
      card.appendChild(body);
      frag.appendChild(card);
    });
  }

  return frag;
}

    ...PROGRESSION.map((note, i) =>
      h('div', { class: 'note-item' },
        h('div', { class: 'note-dash', style: { color: 'var(--dim4)' } }, String(i + 1).padStart(2, '0')),
        h('div', { class: 'note-text' }, note)
      )
    )
  ));

  return frag;
}

// ─── RENDER ENGINE ───────────────────────────────────────────────────────────

async function renderView(view) {
  state.view = view;
  const container = document.getElementById('view-container');
  container.innerHTML = '';

  // Update nav
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === view);
  });

  let content;
  const needsScroll = ['morning', 'foot', 'week', 'history', 'volume'];

  if (view === 'morning') content = renderMorning();
  else if (view === 'foot') content = renderFoot();
  else if (view === 'week') content = renderWeek();
  else if (view === 'lift') { content = renderLift(); container.appendChild(content); return; }
  else if (view === 'history') content = await renderHistory();
  else if (view === 'volume') content = renderVolume();

  if (needsScroll.includes(view)) {
    const scroll = h('div', { class: 'scroll' });
    scroll.appendChild(content);
    container.appendChild(scroll);
  } else {
    container.appendChild(content);
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────

async function init() {
  await openDB();
  await Promise.all([loadLogs(), loadChecks()]);

  // Build nav
  const nav = document.getElementById('main-nav');
  const navItems = [
    { view: 'morning', label: 'AM' },
    { view: 'foot', label: 'Rehab' },
    { view: 'week', label: 'Week' },
    { view: 'lift', label: 'Lift' },
    { view: 'history', label: 'Log' },
    { view: 'volume', label: 'Vol' }
  ];
  navItems.forEach(({ view, label }) => {
    const btn = h('button', { class: 'nav-btn', 'data-view': view }, label);
    btn.addEventListener('click', () => renderView(view));
    nav.appendChild(btn);
  });

  await renderView('morning');

  // Service worker intentionally disabled for iOS compatibility
}

init();
</script>
